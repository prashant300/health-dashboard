window.getStatus = (key, val) => {
  const r = RANGES[key];
  if (!r || val==null) return "unknown";
  if (key==="hdl") { if(val>=r.min) return "normal"; if(val>=r.min*0.85) return "warn"; return "danger"; }
  if (val < r.min) return val < r.min*0.85 ? "danger" : "warn";
  if (val > r.max) return val > r.max*1.15 ? "danger" : "warn";
  return "normal";
};

// ── FIREBASE HELPERS ───────────────────────────────────────────────────
async function saveReport(uid, r)   { await setDoc(doc(db,"users",uid,"reports",r.id), r); }
async function loadReports(uid)     {
  const snap = await getDocs(collection(db,"users",uid,"reports"));
  const arr=[]; snap.forEach(d=>arr.push(d.data()));
  return arr.sort((a,b)=>a.date.localeCompare(b.date));
}
async function deleteReport(uid,id) { await deleteDoc(doc(db,"users",uid,"reports",id)); }
async function seedIfEmpty(uid)     {
  const snap = await getDocs(collection(db,"users",uid,"reports"));
  if(snap.empty) for(const r of SEED_REPORTS) await saveReport(uid,r);
}

async function writeSnapshot(allReports) {
  const labReports    = allReports.filter(r=>!r.type || r.type==="lab");
  const imagingReports= allReports.filter(r=>r.type==="imaging");
  const trends={};
  labReports.forEach(rep=>Object.entries(rep.metrics||{}).forEach(([k,v])=>{
    if(!trends[k]) trends[k]=[];
    trends[k].push({date:rep.date,label:rep.label,value:v});
  }));
  const latest = labReports[labReports.length-1]?.metrics||{};
  const flags = Object.entries(latest)
    .map(([k,v])=>({k,v,st:window.getStatus(k,v)}))
    .filter(x=>x.st!=="normal"&&x.st!=="unknown")
    .map(({k,v,st})=>({
      metric:k, label:(RANGES[k]||{}).label||k, value:v,
      unit:(RANGES[k]||{}).unit||"", status:st,
      ref:RANGES[k]?`${RANGES[k].min}–${RANGES[k].max}`:""
    }));
  await setDoc(doc(db,"claude_snapshot","health_data"),{
    patient:{name:"Prashant Yadav",age:32,sex:"Male",email:ALLOWED_EMAIL},
    lastUpdated:new Date().toISOString(),
    reportCount:labReports.length,
    imagingCount:imagingReports.length,
    reportDates:labReports.map(r=>({date:r.date,label:r.label})),
    latestReport:labReports[labReports.length-1]||null,
    previousReport:labReports[labReports.length-2]||null,
    imagingReports: imagingReports.map(r=>({
      date:r.date, label:r.label, scans:r.imaging||[]
    })),
    trends, flags, allReports:labReports
  });
}

// ── RANGE BAR ──────────────────────────────────────────────────────────
function rangeBar(key, val) {
  const r   = RANGES[key];
  const st  = getStatus(key, val);
  const span = r.max - r.min;
  const lo  = Math.max(0, r.min - span * 0.6);
  const hi  = r.max + span * 0.6;
  const clamp = (v,a,b) => Math.max(a, Math.min(b,v));
  const pct = v => ((clamp(v,lo,hi)-lo)/(hi-lo))*100;
  return `
    <div class="rb-wrap">
      <div class="rb-track">
        <div class="rb-zone" style="left:${pct(r.min)}%;width:${pct(r.max)-pct(r.min)}%"></div>
        <div class="rb-dot rb-${st}" style="left:${pct(val)}%"></div>
      </div>
      <div class="rb-labels">
        <span style="left:${pct(r.min)}%">${r.min}</span>
        <span style="left:${pct(r.max)}%">${r.max}</span>
      </div>
    </div>`;
}

// ── OVERVIEW ───────────────────────────────────────────────────────────
function computeSections() {
  const labReports = reports.filter(r=>!r.type||r.type==="lab");
  const latest = labReports[labReports.length-1]?.metrics || {};
  const prev   = labReports[labReports.length-2]?.metrics || {};
  const actNow=[], watch=[], wins=[];

  Object.entries(latest).forEach(([k,v])=>{
    if(!RANGES[k]) return;
    const st=getStatus(k,v), prevVal=prev[k]??null, prevSt=prevVal!=null?getStatus(k,prevVal):null;
    const trend=()=>{
      if(prevVal==null) return {label:"New",cls:"tn"};
      const diff=v-prevVal, pct=Math.abs(diff/prevVal);
      if(pct<0.03) return {label:"Unchanged",cls:"tu"};
      const rising=diff>0, good=(k==="hdl")?rising:!rising;
      return {label:(rising?"↑ ":"↓ ")+Math.abs(diff).toFixed(1), cls:good?"tg":"tb"};
    };
    if(st==="danger") actNow.push({k,v,trend:trend()});
    else if(st==="warn") watch.push({k,v,trend:trend()});
    else if(st==="normal"&&prevSt&&prevSt!=="normal")
      wins.push({k,v,trend:{label:`was ${prevVal}`,cls:"tg"}});
  });
  return {actNow,watch,wins};
}

function metricCard(item) {
  const r=RANGES[item.k], st=getStatus(item.k,item.v);
  return `
    <div class="mc-row">
      <div class="mc-top">
        <div class="mc-left">
          <span class="mc-name">${r.label}</span>
          <span class="mc-trend ${item.trend.cls}">${item.trend.label}</span>
        </div>
        <div class="mc-right">
          <span class="mc-val mc-val-${st}">${item.v}</span>
          <span class="mc-unit">${r.unit}</span>
        </div>
      </div>
      ${rangeBar(item.k,item.v)}
      <div class="mc-ref">Reference: ${r.min}–${r.max} ${r.unit}</div>
    </div>`;
}

function renderOverview() {
  const {actNow,watch,wins}=computeSections();
  const labReports=reports.filter(r=>!r.type||r.type==="lab");
  const latest=labReports[labReports.length-1], prev=labReports[labReports.length-2];
  if(!latest) return `<div class="page-header"><h1 class="page-title">Overview</h1><p class="empty-state">No lab reports yet — add your first report.</p></div>`;

  return `
    <div class="page-header">
      <h1 class="page-title">Overview</h1>
      <div class="page-sub">
        <span class="report-date-badge">${latest.date}</span>
        <span class="report-lab">${latest.label}</span>
        ${prev?`<span class="report-prev">Previous: ${prev.date} · ${prev.label}</span>`:""}
      </div>
    </div>
    ${actNow.length?`
    <div class="ov-section">
      <div class="ov-sec-head ov-sec-danger">
        <span class="ov-sec-icon">▲</span>
        <span class="ov-sec-title">Act Now</span>
        <span class="ov-sec-sub">${actNow.length} metric${actNow.length>1?"s":""} outside safe range</span>
      </div>
      <div class="ov-sec-body">${actNow.map(metricCard).join("")}</div>
    </div>`:""}
    ${watch.length?`
    <div class="ov-section">
      <div class="ov-sec-head ov-sec-warn">
        <span class="ov-sec-icon">◉</span>
        <span class="ov-sec-title">Watch</span>
        <span class="ov-sec-sub">${watch.length} metric${watch.length>1?"s":""} borderline — monitor closely</span>
      </div>
      <div class="ov-sec-body">${watch.map(metricCard).join("")}</div>
    </div>`:""}
    ${wins.length?`
    <div class="ov-section">
      <div class="ov-sec-head ov-sec-good">
        <span class="ov-sec-icon">✓</span>
        <span class="ov-sec-title">Improved</span>
        <span class="ov-sec-sub">${wins.length} metric${wins.length>1?"s":""} back in normal range</span>
      </div>
      <div class="ov-sec-body">${wins.map(metricCard).join("")}</div>
    </div>`:""}
    ${!actNow.length&&!watch.length?`
    <div class="ov-section">
      <div class="ov-sec-head ov-sec-good">
        <span class="ov-sec-icon">✓</span>
        <span class="ov-sec-title">All Clear</span>
        <span class="ov-sec-sub">All tracked metrics within normal range</span>
      </div>
    </div>`:""}`;
}

// ── GROUP PAGE ─────────────────────────────────────────────────────────
function renderGroup(group){
  const keys=Object.keys(RANGES).filter(k=>RANGES[k].group===group);
  const labReports=reports.filter(r=>!r.type||r.type==="lab");
  return `
    <div class="page-header">
      <h1 class="page-title">${group}</h1>
      <div class="page-sub"><span class="report-lab">${keys.length} parameters</span></div>
    </div>
    <div class="detail-grid">
      ${keys.map(key=>{
        const r=RANGES[key];
        const pts=labReports.map(rep=>({date:rep.date,label:rep.label,val:rep.metrics?.[key]})).filter(p=>p.val!=null);
        if(!pts.length) return "";
        const cur=pts[pts.length-1],prv=pts[pts.length-2];
        const st=getStatus(key,cur.val);
        const delta=prv?(cur.val-prv.val):null;
        const sign=delta===null?"":delta>0?"↑":"↓";
        const dClass=(key==="hdl")?(delta>0?"d-pos":"d-neg"):(delta>0?"d-neg":"d-pos");
        return `<div class="detail-card dc-${st}">
          <div class="dc-header">
            <div>
              <div class="dc-name">${r.label}</div>

            <div class="dc-right">
              <div class="dc-val dc-val-${st}">${cur.val}</div>
              <div class="dc-unit">${r.unit}</div>
              ${delta!==null?`<div class="dc-delta ${dClass}">${sign}${Math.abs(delta).toFixed(1)}</div>`:""}

          </div>
        </div>`;
      }).join("")}
    </div>`;
}

function drawAllCharts(){

    const c=document.getElementById(`dc-${k}`);

function drawChart(canvas,key,W,H){
  const r=RANGES[key];
  const labReports=reports.filter(rep=>!rep.type||rep.type==="lab");
  const pts=labReports.map(rep=>rep.metrics?.[key]).filter(v=>v!=null);
  if(!pts.length) return;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);
  const pad={l:32,r:12,t:8,b:22};
  const IW=W-pad.l-pad.r, IH=H-pad.t-pad.b;
  const allV=[...pts,r.min,r.max];
  const lo=Math.min(...allV)*0.88, hi=Math.max(...allV)*1.1;
  const toY=v=>pad.t+IH-(((v-lo)/(hi-lo))*IH);
  const toX=i=>pts.length<2?pad.l+IW/2:pad.l+(i/(pts.length-1))*IW;
  ctx.fillStyle="rgba(34,197,94,0.08)";
  ctx.fillRect(pad.l,toY(r.max),IW,toY(r.min)-toY(r.max));
  ctx.save(); ctx.setLineDash([3,3]); ctx.lineWidth=1;
  [r.min,r.max].forEach(v=>{ ctx.strokeStyle="rgba(34,197,94,0.4)"; ctx.beginPath(); ctx.moveTo(pad.l,toY(v)); ctx.lineTo(pad.l+IW,toY(v)); ctx.stroke(); });
  ctx.restore();
  ctx.fillStyle="#94a3b8"; ctx.font="9px Inter,sans-serif"; ctx.textAlign="right";
  [r.min,r.max].forEach(v=>ctx.fillText(v,pad.l-4,toY(v)+3));
  ctx.textAlign="center";
  labReports.filter(rep=>rep.metrics?.[key]!=null).forEach((rep,i)=>{
    const allPts=labReports.filter(r2=>r2.metrics?.[key]!=null);
    ctx.fillText(rep.date.slice(5),toX(allPts.indexOf(rep)),H-4);
  });
  if(pts.length===1){
    const st=getStatus(key,pts[0]);
    ctx.beginPath(); ctx.arc(toX(0),toY(pts[0]),5,0,Math.PI*2);
    ctx.fillStyle=st==="normal"?"#22c55e":st==="warn"?"#f59e0b":"#ef4444";
    ctx.fill(); return;
  }
  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.lineTo(toX(pts.length-1),H-pad.b); ctx.lineTo(toX(0),H-pad.b); ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(59,130,246,0.12)"); g.addColorStop(1,"rgba(59,130,246,0)");
  ctx.fillStyle=g; ctx.fill();
  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.strokeStyle="#3b82f6"; ctx.lineWidth=2; ctx.lineJoin="round"; ctx.stroke();
  pts.forEach((v,i)=>{
    const st=getStatus(key,v);
    ctx.beginPath(); ctx.arc(toX(i),toY(v),4,0,Math.PI*2);
    ctx.fillStyle=st==="normal"?"#22c55e":st==="warn"?"#f59e0b":"#ef4444";
    ctx.strokeStyle="#fff"; ctx.lineWidth=1.5; ctx.fill(); ctx.stroke();
  });
}

// ── FLAGS ──────────────────────────────────────────────────────────────
function computeFlags(){
  const labReports=reports.filter(r=>!r.type||r.type==="lab");
  const latest=labReports[labReports.length-1]?.metrics||{};
  const danger=[],warn=[];
  Object.entries(latest).forEach(([k,v])=>{
    const st=getStatus(k,v); if(!RANGES[k]) return;
    const f={metric:k,label:RANGES[k].label,value:v,unit:RANGES[k].unit,ref:`${RANGES[k].min}–${RANGES[k].max}`,status:st};
    if(st==="danger") danger.push(f); else if(st==="warn") warn.push(f);
  });
  return {danger,warn};
}

const IMAGING_KEYWORDS = /\b(x[\s\-]?ray|xray|radiograph|ultrasound|usg|sonograph|mri|magnetic resonance|ct[\s\-]scan|computed tomography|echocardiograph|echo\b|ecg|electrocardiograph|mammograph|dexa|bone density|pet scan|nuclear medicine|doppler)\b/i;
const IMAGING_SECTIONS  = /\b(findings|impression|conclusion|clinical indication|technique|protocol|procedure)\s*[:\-]/i;

function isImagingReport(text, metricsCount) {
  if(!text) return false;
  return IMAGING_KEYWORDS.test(text) || (IMAGING_SECTIONS.test(text) && metricsCount < 5);
}

function extractImagingData(text) {
  const lower = text.toLowerCase();
  // Modality
  let modality = "Other";
  if(/\bx[\s\-]?ray\b|radiograph/i.test(text))          modality="X-Ray";
  else if(/ultrasound|usg|sonograph|doppler/i.test(text)) modality="Ultrasound";
  else if(/\bmri\b|magnetic resonance/i.test(text))       modality="MRI";
  else if(/ct[\s\-]scan|computed tomography/i.test(text)) modality="CT Scan";
  else if(/echocardiograph|echo\b/i.test(text))           modality="Echocardiography";
  else if(/\becg\b|electrocardiograph/i.test(text))       modality="ECG";

  // Body region — look for common terms anywhere in text
  let region = "";
  const regionMatch = text.match(/\b(chest|abdomen|pelvis|abdomen.*pelvis|spine|lumbar|cervical|thoracic|knee|hip|shoulder|wrist|ankle|foot|hand|neck|brain|liver|kidney|thyroid|gallbladder|prostate|breast|pelvis|uterus|ovary|scrotal|cardiac|heart|aorta|carotid)\b/i);
  if(regionMatch) region = regionMatch[1].charAt(0).toUpperCase()+regionMatch[1].slice(1).toLowerCase();

  // Findings
  const findMatch = text.match(/\bfindings?\s*[:\-]\s*([\s\S]*?)(?=\n\s*(?:impression|conclusion|opinion|recommendation|note\b)|$)/i);
  const findings  = findMatch ? findMatch[1].trim().slice(0,3000) : "";

  // Impression
  const impMatch   = text.match(/\b(?:impression|conclusion|opinion)\s*[:\-]\s*([\s\S]*?)(?=\n\s*[A-Z]{3,}[\s:]|$)/i);
  const impression = impMatch ? impMatch[1].trim().slice(0,1000) : "";

  // If neither found, store the first 2000 chars as findings
  const fallback = (!findings && !impression) ? text.trim().slice(0,2000) : "";

  return { modality, region, findings: findings||fallback, impression };
}

function extractDateFromText(text) {
  const labeled = text.match(/(?:collection\s*date|report\s*date|sample\s*date|date\s*of\s*(?:collection|report|sample))[\s:–\-]+(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](20\d{2})/i);
  if(labeled){ const[,d,m,y]=labeled; return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  const bare = text.slice(0,800).match(/(\d{1,2})[\/\-](0[1-9]|1[0-2]|\d)[\/\-](20\d{2})/);
  if(bare){ const[,d,m,y]=bare; if(parseInt(d)<=31&&parseInt(m)<=12) return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  const textDate = text.match(/(\d{1,2})\s+(january|february|march|april|may|june|july|august|september|october|november|december)\s+(20\d{2})/i);
  if(textDate){ const months={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12}; const[,d,mon,y]=textDate; return `${y}-${String(months[mon.toLowerCase()]).padStart(2,'0')}-${d.padStart(2,'0')}`; }
  return null;
}

function extractMetrics(text) {
  const lower=text.toLowerCase().replace(/\n/g," ");
  const metrics={};
  const entries=Object.entries(METRIC_PARSE_MAP).sort((a,b)=>b[0].length-a[0].length);
  for(const[label,key] of entries){
    if(metrics[key]) continue;
    const idx=lower.indexOf(label); if(idx===-1) continue;
    const slice=text.slice(idx+label.length,idx+label.length+160);
    const match=slice.match(/[^a-zA-Z%](\d{1,6}(?:\.\d{1,3})?)/);
    if(match){ const val=parseFloat(match[1]); if(!isNaN(val)&&val>0&&val<100000) metrics[key]=val; }
  }
  return metrics;
}

async function parsePDFFile(file) {
  try {
    // PDF.js loaded as UMD sets window.pdfjsLib
    const lib = window.pdfjsLib || window["pdfjs-dist/build/pdf"];
    if(!lib){ console.warn("PDF.js not loaded"); return {metrics:{},date:null,text:"",isImaging:false}; }
    lib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const buf=await file.arrayBuffer();
    const pdf=await lib.getDocument({data:buf}).promise;
    let text="";
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      text+=content.items.map(item=>item.str+" ").join("")+"\n";
    }
    const metrics=extractMetrics(text);
    const date=extractDateFromText(text);
    const isImg=isImagingReport(text,Object.keys(metrics).length);
    return {metrics,date,text,isImaging:isImg};
  } catch(e){
    console.error("PDF parse error:",e);
    return {metrics:{},date:null,text:"",isImaging:false};
  }
}

window.handleDrop=async(e)=>{
  e.preventDefault();
  document.getElementById("upload-zone").classList.remove("dz-over");
  await processFiles(Array.from(e.dataTransfer.files).filter(f=>f.type==="application/pdf"||f.name.endsWith(".pdf")));

window.handleFileInput=async(input)=>{
  if(!input.files.length) return;
  await processFiles(Array.from(input.files));
  input.value=""; // reset so same file can be re-added
};

async function processFiles(files){
  if(!files.length) return;
  for(const file of files){
    const safeId=`fi_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const li=document.createElement("div");
    li.className="file-item fi-loading"; li.id=safeId;
    li.innerHTML=`<span class="fi-spinner"></span><span class="fi-name">${file.name}</span><span class="fi-status">Reading PDF…</span>`;
    document.getElementById("file-list").appendChild(li);

    const {metrics,date,text,isImaging}=await parsePDFFile(file);
    const count=Object.keys(metrics).length;

    if(date&&!detectedDate){
      detectedDate=date;
      const nd=document.getElementById("nd");
      if(nd) nd.value=date;
    }

    if(isImaging){
      const imgData=extractImagingData(text);
      imagingFiles.push({name:file.name,rawText:text,imgData,date});
      li.className="file-item fi-img";
      li.innerHTML=`
        <span class="fi-icon-img">${MODALITY_ICON[imgData.modality]||"⬜"}</span>
        <div class="fi-info">
          <span class="fi-name">${file.name}</span>
          <span class="fi-tag">Imaging · ${imgData.modality}${imgData.region?" · "+imgData.region:""}</span>
        </div>
        <button class="fi-remove" onclick="removeUploadedFile('${safeId}','imaging')">×</button>`;
    } else {
      Object.assign(mergedMetrics,metrics);
      uploadedFiles.push({id:safeId,name:file.name,metrics,count});
      li.className=`file-item ${count>0?"fi-ok":"fi-warn"}`;
      li.innerHTML=`
        <span class="fi-icon">${count>0?"✓":"!"}</span>
        <div class="fi-info">
          <span class="fi-name">${file.name}</span>
          <span class="fi-tag">${count>0?count+" values found":"No values parsed — check manually"}</span>
        </div>
        <button class="fi-remove" onclick="removeUploadedFile('${safeId}','lab')">×</button>`;
    }
    document.getElementById("upload-actions").style.display="flex";
  }
}

window.removeUploadedFile=(safeId,type)=>{
  if(type==="lab"){
    uploadedFiles=uploadedFiles.filter(f=>f.id!==safeId);
    mergedMetrics={}; uploadedFiles.forEach(f=>Object.assign(mergedMetrics,f.metrics));
  } else {
    imagingFiles.shift(); // simplified — remove first imaging
  }
  document.getElementById(safeId)?.remove();
  if(!uploadedFiles.length&&!imagingFiles.length)
    document.getElementById("upload-actions").style.display="none";
};

window.goToReview=()=>{
  // If we have imaging files, go to imaging review first, then lab
  if(imagingFiles.length) renderModalImagingReview(0);
  else renderModalLabReview();
};

// ── IMAGING REVIEW MODAL ───────────────────────────────────────────────
function renderModalImagingReview(idx){
  const f=imagingFiles[idx];
  const d=f.imgData;
  const date=document.getElementById("nd")?.value||detectedDate||new Date().toISOString().slice(0,10);
  const label=document.getElementById("nl")?.value||"";
  document.getElementById("modal-inner").innerHTML=`
    <div class="m-head">
      <h2>Imaging Report ${imagingFiles.length>1?`(${idx+1}/${imagingFiles.length})`:" "}</h2>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-notice m-notice-info">
      Detected as <strong>${d.modality}</strong> report — review and edit the extracted text below before saving.
    </div>
    <div class="img-review-body">
      <div class="m-meta-row m-meta-top">
        <label class="m-meta-label">Report Date
          <input type="date" id="nd" value="${date}"/>
        </label>
        <label class="m-meta-label">Lab / Source
          <input type="text" id="nl" value="${label}" placeholder="e.g. Apollo Diagnostics"/>
        </label>
      </div>
      <div class="img-review-fields">
        <label class="m-meta-label" style="flex:1;min-width:120px">Modality
          <select id="img-modality" class="img-select">
            ${["X-Ray","Ultrasound","MRI","CT Scan","Echocardiography","ECG","Other"].map(m=>`<option ${m===d.modality?"selected":""}>${m}</option>`).join("")}
          </select>
        </label>
        <label class="m-meta-label" style="flex:2">Body Region
          <input type="text" id="img-region" value="${d.region}" placeholder="e.g. Chest, Abdomen, Knee"/>
        </label>
      </div>
      <label class="img-textarea-label">Findings
        <textarea id="img-findings" class="img-textarea" rows="7" placeholder="Clinical findings from the report…">${d.findings}</textarea>
      </label>
      <label class="img-textarea-label">Impression / Conclusion
        <textarea id="img-impression" class="img-textarea" rows="4" placeholder="Radiologist's impression…">${d.impression}</textarea>
      </label>
      ${f.rawText?`
      <details class="raw-text-details">
        <summary>View raw extracted text</summary>
        <pre class="raw-text-pre">${f.rawText.slice(0,3000).replace(/</g,"&lt;")}</pre>
      </details>`:""}
    </div>
    <div class="m-foot">
      <button class="m-back" onclick="renderModalUpload()">← Back</button>
      <button class="m-save" onclick="submitImagingReport(${idx})">
        ${idx<imagingFiles.length-1||(uploadedFiles.length>0||Object.keys(mergedMetrics).length>0)?"Next →":"Save Report"}
      </button>
    </div>`;
}

window.submitImagingReport=async(idx)=>{
  const date=document.getElementById("nd").value;
  const label=document.getElementById("nl").value||"Unknown";
  const modality=document.getElementById("img-modality").value;
  const region=document.getElementById("img-region").value.trim();
  const findings=document.getElementById("img-findings").value.trim();
  const impression=document.getElementById("img-impression").value.trim();
  if(!date){alert("Select a date");return;}
  const rep={
    id:`${date}-img-${Date.now()}`,
    date,label,
    type:"imaging",
    imaging:[{modality,region,findings,impression}],
    metrics:{}
  };
  await window.__save(rep);
  // After saving this imaging report, check if more imaging or lab to process
  if(idx<imagingFiles.length-1) renderModalImagingReview(idx+1);
  else if(uploadedFiles.length>0||Object.keys(mergedMetrics).length>0) renderModalLabReview();
  // else modal closes via __save
};

// ── LAB REVIEW MODAL ──────────────────────────────────────────────────
function renderModalLabReview(){
  const groups=[...new Set(Object.values(RANGES).map(r=>r.group))];
  const date=document.getElementById("nd")?.value||new Date().toISOString().slice(0,10);
  const label=document.getElementById("nl")?.value||"";
  const parsedCount=Object.keys(mergedMetrics).length;
  document.getElementById("modal-inner").innerHTML=`
    <div class="m-head">
      <h2>Lab Values</h2>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    ${parsedCount>0?`<div class="m-notice m-notice-ok">✓ ${parsedCount} values auto-filled from ${uploadedFiles.length} file${uploadedFiles.length!==1?"s":""}. Highlighted fields were parsed — correct anything before saving.</div>`
    :`<div class="m-notice m-notice-info">No values auto-parsed — enter manually below.</div>`}
    <div class="m-meta-row m-meta-top">
      <label class="m-meta-label">Report Date
        <input type="date" id="nd" value="${date}"/>
        ${detectedDate?`<span class="m-meta-hint">Auto-detected from PDF</span>`:""}
      </label>
      <label class="m-meta-label">Lab / Source
        <input type="text" id="nl" value="${label}" placeholder="e.g. Tata 1mg"/>
      </label>
    </div>
    <div class="m-groups">
      ${groups.map(g=>{
        const keys=Object.keys(RANGES).filter(k=>RANGES[k].group===g);
        return `<div class="m-group">
          <div class="m-gtitle">${g}</div>
          <div class="m-fields">
            ${keys.map(k=>{
              const r=RANGES[k], val=mergedMetrics[k], st=val!=null?getStatus(k,val):"";
              return `<label class="m-field ${val!=null?"mf-found":""}">
                <span class="mf-label">${r.label} <em>${r.unit}</em></span>
                <input type="number" step="any" id="f-${k}"
                  placeholder="${r.min}–${r.max}"
                  ${val!=null?`value="${val}"`:""}
                  class="${st?"fi-"+st:""}"/>
              </label>`;
            }).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>
    <div class="m-foot">
      <button class="m-back" onclick="renderModalUpload()">← Back</button>
      <button class="m-save" onclick="submitLabReport()">Save Report</button>
    </div>`;
}

window.submitLabReport=async()=>{
  const date=document.getElementById("nd").value;
  const label=document.getElementById("nl").value||"Unknown Lab";
  if(!date){alert("Select a date");return;}
  const metrics={};
  Object.keys(RANGES).forEach(k=>{
    const el=document.getElementById(`f-${k}`);
    if(el&&el.value!=="") metrics[k]=parseFloat(el.value);
  });
  if(!Object.keys(metrics).length){alert("Enter at least one value");return;}
  await window.__save({id:date,date,label,metrics});
};
</script>

<style>

/* ── MODAL ── */
#modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,23,42,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px;}

.m-meta-hint{font-size:0.68rem;color:var(--text3);font-weight:400;}

/* Upload zone — entire box is a click target */
.upload-zone{
  border:2px dashed var(--border2);border-radius:var(--r);
  padding:40px 24px;text-align:center;cursor:pointer;
  transition:border-color 0.2s,background 0.2s;
  background:var(--surface2);
  user-select:none;
}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-bg);}
.upload-zone.dz-over{border-color:var(--accent);background:var(--accent-bg);}
.dz-icon{font-size:2rem;color:var(--text3);margin-bottom:10px;}
.dz-text{font-size:0.95rem;font-weight:600;color:var(--text2);margin-bottom:6px;}
.dz-sub{font-size:0.8rem;color:var(--text3);margin-bottom:8px;}
.dz-hint{font-size:0.7rem;color:var(--text3);}

#file-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
.file-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;font-size:0.8rem;border:1px solid var(--border);}
.fi-loading{background:var(--surface2);color:var(--text3);}
.fi-ok{background:var(--good-acc);border-color:var(--good-b);}
.fi-warn{background:var(--warn-acc);border-color:var(--warn-b);}
.fi-img{background:var(--accent-bg);border-color:#bfdbfe;}
.fi-spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.fi-icon{font-size:0.9rem;flex-shrink:0;}
.fi-ok .fi-icon{color:var(--good);}
.fi-warn .fi-icon{color:var(--warn);}
.fi-icon-img{font-size:1.2rem;flex-shrink:0;}
.fi-info{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden;}
.fi-name{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:0.82rem;}
.fi-tag{font-size:0.7rem;color:var(--text3);}
.fi-status{font-size:0.72rem;color:var(--text3);}
.fi-remove{background:transparent;border:1px solid var(--border2);color:var(--text3);width:22px;height:22px;border-radius:5px;font-size:0.9rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

.upload-actions{display:flex;flex-direction:row;align-items:center;justify-content:space-between;margin-top:14px;gap:10px;}
.add-more-btn{font-size:0.8rem;font-weight:500;color:var(--accent);cursor:pointer;padding:8px 14px;border-radius:7px;border:1px solid #bfdbfe;background:var(--accent-bg);white-space:nowrap;}
.review-btn{padding:9px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.84rem;font-weight:500;white-space:nowrap;}
.review-btn:hover{background:#1d4ed8;}

.m-divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:0.74rem;margin:16px 0;}
.m-divider::before,.m-divider::after{content:"";flex:1;height:1px;background:var(--border);}
.m-manual-btn{padding:10px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:8px;font-size:0.82rem;}
.m-manual-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Imaging review */
.img-review-body{padding:0 28px 8px;}
.img-review-fields{display:flex;gap:14px;padding:16px 0 4px;flex-wrap:wrap;}
.img-select{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:8px;font-size:0.84rem;margin-top:2px;}
.img-textarea-label{display:flex;flex-direction:column;gap:6px;font-size:0.74rem;font-weight:500;color:var(--text2);margin-bottom:14px;padding:0 28px;}
.img-textarea{background:var(--surface2);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:8px;font-size:0.84rem;line-height:1.6;resize:vertical;}
.img-textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
.raw-text-details{padding:0 28px 16px;}
.raw-text-details summary{font-size:0.75rem;color:var(--text3);cursor:pointer;padding:8px 0;}
.raw-text-pre{font-size:0.72rem;color:var(--text3);background:var(--surface2);padding:12px;border-radius:8px;white-space:pre-wrap;overflow:auto;max-height:200px;margin-top:8px;}

/* Lab review */
.m-groups{padding:0 28px 8px;}
.m-group{margin-bottom:22px;}
.m-gtitle{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.m-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;}
.m-field{display:flex;flex-direction:column;gap:3px;}
.mf-label{font-size:0.72rem;color:var(--text2);font-weight:500;}
.mf-label em{color:var(--text3);font-style:normal;font-weight:400;margin-left:3px;font-size:0.65rem;}
.m-field input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:0.82rem;}
.m-field input:focus{outline:none;border-color:var(--accent);background:#fff;}
.mf-found input{border-color:var(--good-b);background:var(--good-acc);}
.fi-warn{border-color:var(--warn-b)!important;}
.fi-danger{border-color:var(--danger-b)!important;}

.m-foot{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:16px 28px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);}
.m-back{padding:8px 16px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:7px;font-size:0.8rem;}
.m-save{padding:9px 24px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:0.84rem;font-weight:500;}
.m-save:hover{background:#1d4ed8;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:900px){
  #app{grid-template-columns:1fr;}
  #sidebar{position:relative;height:auto;}
  #main-content{padding:24px 20px 60px;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>

        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
