window.getStatus = (key, val) => {
  const r = RANGES[key];
  if (!r || val==null) return "unknown";
  if (key==="hdl") { if(val>=r.min) return "normal"; if(val>=r.min*0.85) return "warn"; return "danger"; }
  if (val < r.min) return val < r.min*0.85 ? "danger" : "warn";
  if (val > r.max) return val > r.max*1.15 ? "danger" : "warn";
  return "normal";
};

// ── FIREBASE HELPERS ───────────────────────────────────────────────────
async function saveReport(uid, r)  { await setDoc(doc(db,"users",uid,"reports",r.id), r); }
async function loadReports(uid)    {
  const snap = await getDocs(collection(db,"users",uid,"reports"));
  const arr=[]; snap.forEach(d=>arr.push(d.data()));
  return arr.sort((a,b)=>a.date.localeCompare(b.date));
}
async function deleteReport(uid,id){ await deleteDoc(doc(db,"users",uid,"reports",id)); }
async function seedIfEmpty(uid)    {
  const snap = await getDocs(collection(db,"users",uid,"reports"));
  if(snap.empty) for(const r of SEED_REPORTS) await saveReport(uid,r);
}

async function writeSnapshot(allReports) {
  const trends={};
  allReports.forEach(rep=>Object.entries(rep.metrics).forEach(([k,v])=>{
    if(!trends[k]) trends[k]=[];
    trends[k].push({date:rep.date,label:rep.label,value:v});
  }));
  const latest = allReports.length ? allReports[allReports.length-1].metrics : {};
  const flags = Object.entries(latest)
    .map(([k,v])=>({k,v,st:window.getStatus(k,v)}))
    .filter(x=>x.st!=="normal"&&x.st!=="unknown")
    .map(({k,v,st})=>({
      metric:k, label:(RANGES[k]||{}).label||k, value:v,
      unit:(RANGES[k]||{}).unit||"", status:st,
      ref:RANGES[k]?`${RANGES[k].min}–${RANGES[k].max}`:""
    }));
  await setDoc(doc(db,"claude_snapshot","health_data"),{
    patient:{name:"Prashant Yadav",age:32,sex:"Male",email:ALLOWED_EMAIL},
    lastUpdated:new Date().toISOString(),
    reportCount:allReports.length,
    reportDates:allReports.map(r=>({date:r.date,label:r.label})),
    latestReport:allReports[allReports.length-1]||null,
    previousReport:allReports[allReports.length-2]||null,
    trends, flags, allReports
  });
}

// ── OVERVIEW ── 3-SECTION LAYOUT ──────────────────────────────────────
function computeSections() {
  const latest = reports[reports.length-1]?.metrics || {};
  const prev   = reports[reports.length-2]?.metrics || {};
  const actNow = [], watch = [], wins = [];

  Object.entries(latest).forEach(([k, v]) => {
    if (!RANGES[k]) return;
    const st     = getStatus(k, v);
    const prevVal = prev[k] != null ? prev[k] : null;
    const prevSt  = prevVal != null ? getStatus(k, prevVal) : null;

    const trendLabel = () => {
      if (prevVal == null) return "New finding";
      const diff = v - prevVal;
      const pct  = Math.abs(diff / prevVal);
      if (pct < 0.03) return "→ Unchanged";
      if (k === "hdl") return diff > 0 ? "↑ Improving" : "↓ Falling";
      return diff > 0 ? "↑ Rising" : "↓ Falling";
    };

    if (st === "danger") {
      actNow.push({ k, v, prevVal, prevSt, trend: trendLabel() });
    } else if (st === "warn") {
      watch.push({ k, v, prevVal, prevSt, trend: trendLabel() });
    } else if (st === "normal" && prevSt && prevSt !== "normal") {
      const prevLabel = `was ${prevVal}`;
      wins.push({ k, v, prevVal, prevSt, trend: prevLabel });
    }
  });

  return { actNow, watch, wins };
}

function metricRow(item, mode) {
  const r = RANGES[item.k];
  const trendClass = item.trend.startsWith("↑") ? (item.k === "hdl" ? "tr-good" : "tr-bad")
                   : item.trend.startsWith("↓") ? (item.k === "hdl" ? "tr-bad"  : "tr-good")
                   : item.trend === "New finding" ? "tr-new"
                   : mode === "wins" ? "tr-good" : "tr-neutral";
  return `
    <div class="metric-row">
      <span class="mr-label">${r.label}</span>
      <span class="mr-val">${item.v} <em>${r.unit}</em></span>
      <span class="mr-ref">ref ${r.min}–${r.max}</span>
      <span class="mr-trend ${trendClass}">${item.trend}</span>
    </div>`;
}

function renderOverview() {
  const { actNow, watch, wins } = computeSections();
  const latest = reports[reports.length-1];
  const noData = !latest;

  if (noData) return `<div class="page-header"><h1 class="page-title">Overview</h1><p style="color:var(--text3);margin-top:24px">No reports yet. Add your first report to get started.</p></div>`;

  return `
    <div class="ov-header">
      <div>
        <h1 class="page-title">Overview</h1>
        <div class="page-sub">Last updated ${latest.date} · ${latest.label}</div>
      </div>
    </div>

    <!-- ACT NOW -->
    ${actNow.length ? `
    <div class="section-card sc-danger">
      <div class="sc-head">
        <span class="sc-icon">▲</span>
        <span class="sc-title">Act Now</span>
        <span class="sc-count sc-count-danger">${actNow.length}</span>
        <span class="sc-desc">These need attention — out of safe range</span>
      </div>
      <div class="sc-rows">
        ${actNow.map(i => metricRow(i, "danger")).join("")}
      </div>
    </div>` : ""}

    <!-- WATCH -->
    ${watch.length ? `
    <div class="section-card sc-warn">
      <div class="sc-head">
        <span class="sc-icon">◎</span>
        <span class="sc-title">Watch</span>
        <span class="sc-count sc-count-warn">${watch.length}</span>
        <span class="sc-desc">Borderline — could become serious if not addressed</span>
      </div>
      <div class="sc-rows">
        ${watch.map(i => metricRow(i, "watch")).join("")}
      </div>
    </div>` : ""}

    <!-- WINS -->
    ${wins.length ? `
    <div class="section-card sc-good">
      <div class="sc-head">
        <span class="sc-icon">✓</span>
        <span class="sc-title">Improved</span>
        <span class="sc-count sc-count-good">${wins.length}</span>
        <span class="sc-desc">Back in range since last report</span>
      </div>
      <div class="sc-rows">
        ${wins.map(i => metricRow(i, "wins")).join("")}
      </div>
    </div>` : ""}

    ${!actNow.length && !watch.length && !wins.length ? `
    <div class="section-card sc-good">
      <div class="sc-head">
        <span class="sc-icon">✓</span>
        <span class="sc-title">All Clear</span>
        <span class="sc-desc">All tracked metrics are within normal range</span>
      </div>
    </div>` : ""}
  `;
}

// ── GROUP PAGE ─────────────────────────────────────────────────────────
function renderGroup(group){
  const keys = Object.keys(RANGES).filter(k=>RANGES[k].group===group);
  const latest=reports[reports.length-1]?.metrics||{};
  const prev  =reports[reports.length-2]?.metrics||{};

  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">${group}</h1>
        <div class="page-sub">${keys.length} parameters tracked</div>
      </div>
    </div>
    <div class="detail-grid">
      ${keys.map(key=>{
        const r=RANGES[key];
        const pts=reports.map(rep=>({date:rep.date,label:rep.label,val:rep.metrics[key]})).filter(p=>p.val!=null);
        if(!pts.length) return "";
        const cur=pts[pts.length-1], prv=pts[pts.length-2];
        const st=getStatus(key,cur.val);
        const delta=prv?(cur.val-prv.val):null;
        const sign=delta===null?"":delta>0?"↑":"↓";
        const dClass=(key==="hdl")?(delta>0?"d-pos":"d-neg"):(delta>0?"d-neg":"d-pos");
        return `<div class="detail-card dc-${st}">
          <div class="dc-header">
            <div>
              <div class="dc-name">${r.label}</div>
              <div class="dc-ref">ref ${r.min}–${r.max} ${r.unit}</div>
            </div>
            <div class="dc-right">
              <div class="dc-val">${cur.val}</div>
              <div class="dc-unit">${r.unit}</div>
              ${delta!==null?`<div class="dc-delta ${dClass}">${sign}${Math.abs(delta).toFixed(1)}</div>`:""}
            </div>
          </div>
          <canvas id="dc-${key}" class="dc-canvas" width="320" height="90"></canvas>
          <div class="dc-history">
            ${pts.map(p=>`<span class="dh-pt dh-${getStatus(key,p.val)}" title="${p.label}">${p.date.slice(2)}: ${p.val}</span>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
}

          .filter(([k,v])=>getStatus(k,v)!=="normal"&&getStatus(k,v)!=="unknown");
        const dangerCount=flags.filter(([k,v])=>getStatus(k,v)==="danger").length;
        const warnCount  =flags.filter(([k,v])=>getStatus(k,v)==="warn").length;
        return `<div class="hist-card">
          <div class="hist-top">
            <div>
              <div class="hist-date">${rep.date}</div>
              <div class="hist-lab">${rep.label}</div>
            </div>
            <div class="hist-counts">
              <span class="hc-total">${Object.keys(rep.metrics).length} metrics</span>
              ${dangerCount?`<span class="hc-d">${dangerCount} critical</span>`:""}
              ${warnCount  ?`<span class="hc-w">${warnCount} watch</span>`:""}
              ${!dangerCount&&!warnCount?`<span class="hc-ok">All clear</span>`:""}
              <button class="btn-del-hist" onclick="window.__del('${rep.id}')">✕</button>
            </div>
          </div>
          <div class="hist-metrics">
            ${Object.entries(rep.metrics).slice(0,20).map(([k,v])=>{
              const st=getStatus(k,v);
              return `<span class="hm-chip hm-${st}" title="${RANGES[k]?.label||k}">${RANGES[k]?.label||k}: ${v}</span>`;
            }).join("")}
            ${Object.keys(rep.metrics).length>20?`<span class="hm-chip hm-more">+${Object.keys(rep.metrics).length-20} more</span>`:""}
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
}

// ── CHART DRAWING ──────────────────────────────────────────────────────
function drawAllCharts(){
  Object.keys(RANGES).forEach(k=>{
    const c=document.getElementById(`dc-${k}`);
    if(c) drawChart(c, k, 320, 90, false);
  });
}

function drawChart(canvas, key, W, H, mini){
  const r=RANGES[key];
  const pts=reports.map(rep=>rep.metrics[key]).filter(v=>v!=null);
  if(!pts.length) return;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);
  const pad={l:mini?4:30, r:mini?4:10, t:mini?4:8, b:mini?4:22};
  const IW=W-pad.l-pad.r, IH=H-pad.t-pad.b;

  const allV=[...pts,r.min,r.max];
  const lo=Math.min(...allV)*0.88, hi=Math.max(...allV)*1.1;
  const toY=v=>pad.t+IH-(((v-lo)/(hi-lo))*IH);
  const toX=i=>pts.length<2?pad.l+IW/2:pad.l+(i/(pts.length-1))*IW;

  const yLo=toY(r.min), yHi=toY(r.max);
  ctx.fillStyle="rgba(134,239,172,0.07)";
  ctx.fillRect(pad.l, yHi, IW, yLo-yHi);

  ctx.save(); ctx.setLineDash([3,3]); ctx.lineWidth=1;
  [r.min,r.max].forEach(v=>{
    ctx.strokeStyle="rgba(134,239,172,0.35)";
    ctx.beginPath(); ctx.moveTo(pad.l,toY(v)); ctx.lineTo(pad.l+IW,toY(v)); ctx.stroke();
  });
  ctx.restore();

  if(!mini){
    ctx.fillStyle="rgba(148,163,184,0.6)";
    ctx.font="9px Geist Mono, monospace";
    ctx.textAlign="right";
    [r.min,r.max].forEach(v=>ctx.fillText(v, pad.l-4, toY(v)+3));
    ctx.textAlign="center";
    reports.filter(rep=>rep.metrics[key]!=null).forEach((rep,i)=>{
      const allPts=reports.filter(r2=>r2.metrics[key]!=null);
      const xi=allPts.indexOf(rep);
      ctx.fillText(rep.date.slice(5), toX(xi), H-4);
    });
  }

  if(pts.length===1){
    const st=getStatus(key,pts[0]);
    ctx.beginPath(); ctx.arc(toX(0),toY(pts[0]),5,0,Math.PI*2);
    ctx.fillStyle=st==="normal"?"#86efac":st==="warn"?"#fcd34d":"#fca5a5";
    ctx.fill(); return;
  }

  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.lineTo(toX(pts.length-1),H); ctx.lineTo(toX(0),H); ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(96,165,250,0.18)"); g.addColorStop(1,"rgba(96,165,250,0)");
  ctx.fillStyle=g; ctx.fill();

  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.strokeStyle="rgba(96,165,250,0.7)"; ctx.lineWidth=1.5; ctx.lineJoin="round"; ctx.stroke();

  pts.forEach((v,i)=>{
    const st=getStatus(key,v);
    ctx.beginPath(); ctx.arc(toX(i),toY(v),mini?3:4,0,Math.PI*2);
    ctx.fillStyle=st==="normal"?"#86efac":st==="warn"?"#fcd34d":"#fca5a5";
    ctx.strokeStyle="rgba(15,23,42,0.8)"; ctx.lineWidth=1.2;
    ctx.fill(); ctx.stroke();
  });
}

// ── FLAGS & INSIGHTS ───────────────────────────────────────────────────
function computeFlags(){
  const latest=reports[reports.length-1]?.metrics||{};
  const danger=[], warn=[];
  Object.entries(latest).forEach(([k,v])=>{
    const st=getStatus(k,v); if(!RANGES[k]) return;
    const f={metric:k,label:RANGES[k].label,value:v,unit:RANGES[k].unit,ref:`${RANGES[k].min}–${RANGES[k].max}`,status:st};
    if(st==="danger") danger.push(f);
    else if(st==="warn") warn.push(f);
  });
  return {danger,warn};
}

// ── PDF PARSING ────────────────────────────────────────────────────────
const METRIC_PARSE_MAP = {
  "uric acid": "uric_acid", "serum uric acid": "uric_acid",
  "fasting glucose": "fasting_glucose", "fasting blood glucose": "fasting_glucose",
  "fasting blood sugar": "fasting_glucose", "fbs": "fasting_glucose",
  "hemoglobin": "hemoglobin", "haemoglobin": "hemoglobin",
  "total cholesterol": "total_cholesterol", "cholesterol": "total_cholesterol",
  "triglycerides": "triglycerides", "triglyceride": "triglycerides",
  "hdl cholesterol": "hdl", "hdl-c": "hdl",
  "ldl cholesterol": "ldl", "ldl-c": "ldl",
  "vldl": "vldl",
  "non hdl": "non_hdl", "non-hdl": "non_hdl",
  "sgot": "sgot", "ast": "sgot", "aspartate aminotransferase": "sgot",
  "sgpt": "sgpt", "alt": "sgpt", "alanine aminotransferase": "sgpt",
  "alkaline phosphatase": "alp",
  "gamma gt": "ggt", "gamma glutamyl": "ggt",
  "bilirubin total": "bilirubin_total", "total bilirubin": "bilirubin_total",
  "direct bilirubin": "bilirubin_direct",
  "indirect bilirubin": "bilirubin_indirect",
  "total protein": "total_protein", "albumin": "albumin",
  "globulin": "globulin", "a/g ratio": "ag_ratio",
  "creatinine": "creatinine", "serum creatinine": "creatinine",
  "blood urea nitrogen": "bun",
  "urea": "urea", "serum urea": "urea",
  "sodium": "sodium", "potassium": "potassium", "chloride": "chloride",
  "25-oh vitamin d": "vitamin_d", "25 oh vitamin d": "vitamin_d",
  "vitamin d": "vitamin_d",
  "vitamin b12": "vitamin_b12", "vit b12": "vitamin_b12",
  "calcium": "calcium",
  "tsh": "tsh",
  "hba1c": "hba1c", "haemoglobin a1c": "hba1c", "glycated hemoglobin": "hba1c",
  "wbc": "wbc", "total leucocyte count": "wbc", "tlc": "wbc",
  "neutrophils": "neutrophils", "lymphocytes": "lymphocytes",
  "monocytes": "monocytes", "eosinophils": "eosinophils", "basophils": "basophils",
  "platelet count": "platelets", "platelets": "platelets",
  "esr": "esr",
  "serum iron": "iron_serum",
  "tibc": "tibc", "uibc": "uibc",
  "transferrin saturation": "transferrin_sat",
  "prolactin": "prolactin",
  "total testosterone": "testosterone", "testosterone": "testosterone",
  "cortisol": "cortisol", "serum cortisol": "cortisol",
  "prostate specific antigen": "psa",
};

function extractMetrics(text) {
  const lower = text.toLowerCase().replace(/\n/g," ");
  const metrics = {};
  // Sort by label length desc to match longer labels first
  const entries = Object.entries(METRIC_PARSE_MAP).sort((a,b)=>b[0].length-a[0].length);
  for (const [label, key] of entries) {
    if (metrics[key]) continue; // already matched
    const idx = lower.indexOf(label);
    if (idx === -1) continue;
    const slice = text.slice(idx + label.length, idx + label.length + 150);
    const match = slice.match(/[^a-zA-Z](\d+(?:\.\d+)?)/);
    if (match) {
      const val = parseFloat(match[1]);
      if (!isNaN(val) && val > 0 && val < 100000) metrics[key] = val;
    }
  }
  return metrics;
}

async function parsePDFFile(file) {
  try {
    if (typeof pdfjsLib === "undefined") {
      window.pdfjsLib = window["pdfjs-dist/build/pdf"] || window.pdfjsLib;
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let text = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str + " ").join("") + "\n";
    }
    return extractMetrics(text);
  } catch(e) {
    console.error("PDF parse error:", e);
    return {};
  }
}

function renderModalUpload() {
  document.getElementById("modal-inner").innerHTML = `

window.handleDrop = async (e) => {
  e.preventDefault();
  document.getElementById("upload-zone").classList.remove("drag-over");
  const file = e.dataTransfer.files[0];
  if (file) await processFile(file);
};

window.handleFileInput = async (input) => {
  if (input.files[0]) await processFile(input.files[0]);
};

async function processFile(file) {
  const uz = document.getElementById("upload-zone");
  uz.innerHTML = `<div class="uz-loading"><div class="uz-spinner"></div><div>Reading ${file.name}…</div></div>`;
  const metrics = await parsePDFFile(file);
  parsedMetrics = metrics;
  const count = Object.keys(metrics).length;
  if (count > 0) {
    renderModalManual(metrics, `Found ${count} values from PDF — review before saving`);
  } else {
    renderModalManual({}, "Couldn't auto-parse this PDF — enter values manually");
  }
}

function renderModalManual(prefill = {}, notice = "") {
  const groups = [...new Set(Object.values(RANGES).map(r => r.group))];
  document.getElementById("modal-inner").innerHTML = `
    <div class="m-head">
      <h2>Review & Save</h2>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    ${notice ? `<div class="m-notice">${notice}</div>` : ""}
    <div class="m-meta-row m-meta-pad">
      <label class="m-meta-label">Date
        <input type="date" id="nd" value="${new Date().toISOString().slice(0,10)}"/>
      </label>
      <label class="m-meta-label">Lab / Source
        <input type="text" id="nl" placeholder="e.g. Tata 1mg"/>
      </label>
    </div>
    <div class="m-groups">
      ${groups.map(g => {
        const keys = Object.keys(RANGES).filter(k => RANGES[k].group === g);
        const hasPrefill = keys.some(k => prefill[k] != null);
        return `
          <div class="m-group">
            <div class="m-gtitle">${g}</div>
            <div class="m-fields">
              ${keys.map(k => {
                const r = RANGES[k];
                const val = prefill[k];
                const st = val != null ? getStatus(k, val) : "";
                return `<label class="m-field ${val != null ? "m-field-found" : ""}">
                  <span>${r.label}<em>${r.unit}</em></span>
                  <input type="number" step="any" id="f-${k}"
                    placeholder="${r.min}–${r.max}"
                    ${val != null ? `value="${val}"` : ""}
                    class="${st ? "fi-"+st : ""}"/>
                </label>`;
              }).join("")}
            </div>
          </div>`;
      }).join("")}
    </div>
    <div class="m-foot">
      <button class="m-cancel" onclick="renderModalUpload()">← Back</button>
      <button class="m-save" onclick="submitReport()">Save Report</button>
    </div>
  `;
}

window.submitReport = async () => {
  const date  = document.getElementById("nd").value;
  const label = document.getElementById("nl").value || "Unknown Lab";
  if (!date) { alert("Select a date"); return; }
  const metrics = {};
  Object.keys(RANGES).forEach(k => {
    const el = document.getElementById(`f-${k}`);
    if (el && el.value !== "") metrics[k] = parseFloat(el.value);
  });
  if (!Object.keys(metrics).length) { alert("Enter at least one value"); return; }
  await window.__save({ id: date, date, label, metrics });
};

.dc-right  { text-align: right; }
.dc-val    { font-size: 1.4rem; font-weight: 300; }
.dc-unit   { font-size: 0.65rem; color: var(--text3); }
.dc-delta  { font-size: 0.7rem; margin-top: 2px; }
.dc-canvas { display: block; width: 100%; }
.dc-history{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.dh-pt { font-size: 0.62rem; padding: 2px 6px; border-radius: 4px; }
.dh-normal { background: rgba(134,239,172,0.1); color: var(--green); }
.dh-warn   { background: rgba(252,211,77,0.1);  color: var(--yellow); }
.dh-danger { background: rgba(252,165,165,0.1); color: var(--red); }
.d-pos { color: var(--green); } .d-neg { color: var(--red); }

/* ── HISTORY ── */
.hist-list { display: flex; flex-direction: column; gap: 14px; }
.hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
.hist-top  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.hist-date { font-family: var(--serif); font-size: 1.2rem; font-style: italic; }
.hist-lab  { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
.hist-counts { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.hc-total { font-size: 0.68rem; color: var(--text3); }
.hc-d     { font-size: 0.68rem; background: rgba(252,165,165,0.1); color: var(--red);    padding: 2px 8px; border-radius: 20px; }
.hc-w     { font-size: 0.68rem; background: rgba(252,211,77,0.1);  color: var(--yellow); padding: 2px 8px; border-radius: 20px; }
.hc-ok    { font-size: 0.68rem; background: rgba(134,239,172,0.1); color: var(--green);  padding: 2px 8px; border-radius: 20px; }
.btn-del-hist { background: transparent; border: 1px solid rgba(252,165,165,0.2); color: var(--red); padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; }
.hist-metrics { display: flex; flex-wrap: wrap; gap: 6px; }
.hm-chip   { font-size: 0.65rem; padding: 3px 8px; border-radius: 5px; }
.hm-normal { background: rgba(134,239,172,0.07); color: var(--text2); }
.hm-warn   { background: rgba(252,211,77,0.1);   color: var(--yellow); }
.hm-danger { background: rgba(252,165,165,0.1);  color: var(--red); }
.hm-more   { background: var(--surface2); color: var(--text3); }

/* ── MODAL ── */
#modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 20px;
}
#modal-inner {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
  width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.m-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 22px 28px 18px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.m-head h2 { font-family: var(--serif); font-style: italic; font-size: 1.4rem; font-weight: 400; }
.m-close { background: transparent; border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 7px; font-size: 0.9rem; }
.m-notice {
  margin: 0 28px 0; padding: 10px 14px; border-radius: 8px; font-size: 0.76rem;
  background: rgba(96,165,250,0.08); color: #93c5fd; border: 1px solid rgba(96,165,250,0.2);
  margin-top: 16px;
}
.m-meta-row {
  display: flex; gap: 14px; padding: 20px 28px; flex-wrap: wrap;
}
.m-meta-pad { padding-top: 20px; }
.m-meta-label {
  display: flex; flex-direction: column; gap: 5px; font-size: 0.72rem;
  color: var(--text3); flex: 1; min-width: 160px;
}
.m-meta-label input {
  background: var(--bg); border: 1px solid var(--border2); color: var(--text);
  padding: 9px 12px; border-radius: 8px; font-size: 0.84rem;
}
.m-upload-body { padding: 0 28px 24px; display: flex; flex-direction: column; gap: 0; }
.upload-zone {
  border: 1.5px dashed var(--border2); border-radius: var(--r);
  padding: 40px 24px; text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 4px;
}
.upload-zone.drag-over { border-color: var(--accent); background: rgba(59,130,246,0.05); }
.uz-icon { font-size: 1.8rem; color: var(--text3); margin-bottom: 12px; }
.uz-text { font-size: 0.9rem; color: var(--text2); margin-bottom: 6px; }
.uz-sub  { font-size: 0.78rem; color: var(--text3); margin-bottom: 10px; }
.uz-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
.uz-note { font-size: 0.68rem; color: var(--text3); }
.uz-loading { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 10px 0; color: var(--text2); font-size: 0.82rem; }
.uz-spinner {
  width: 24px; height: 24px; border: 2px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.m-divider {
  display: flex; align-items: center; gap: 12px;
  color: var(--text3); font-size: 0.72rem; margin: 16px 0;
}
.m-divider::before, .m-divider::after { content:""; flex:1; height:1px; background: var(--border); }
.m-manual-btn {
  padding: 10px 16px; background: transparent; color: var(--text2);
  border: 1px solid var(--border2); border-radius: 8px; font-size: 0.8rem;
  transition: color 0.15s, border-color 0.15s;
}
.m-manual-btn:hover { color: var(--text); border-color: var(--accent); }
.m-groups { padding: 0 28px 8px; }
.m-group  { margin-bottom: 20px; }
.m-gtitle { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.m-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); gap: 8px; }
.m-field  { display: flex; flex-direction: column; gap: 3px; font-size: 0.7rem; color: var(--text3); }
.m-field-found { opacity: 1; }
.m-field em { color: var(--accent); font-style: normal; margin-left: 4px; font-size: 0.62rem; }
.m-field input {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 9px; border-radius: 6px; font-size: 0.78rem;
}
.m-field-found input { border-color: rgba(134,239,172,0.25); }
.m-field input:focus { outline: none; border-color: var(--accent); }
.fi-warn   { border-color: rgba(252,211,77,0.35) !important; }
.fi-danger { border-color: rgba(252,165,165,0.35) !important; }
.m-foot {
  display: flex; justify-content: space-between; align-items: center;
  gap: 8px; padding: 16px 28px; border-top: 1px solid var(--border);
  position: sticky; bottom: 0; background: var(--surface);
}
.m-cancel { padding: 9px 16px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 7px; font-size: 0.78rem; }
.m-save   { padding: 9px 22px; background: var(--accent); color: #fff; border: none; border-radius: 7px; font-size: 0.78rem; font-weight: 500; }
.m-save:hover { background: #2563eb; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  #sidebar { position: relative; height: auto; flex-direction: row; flex-wrap: wrap; padding: 12px; }
  .detail-grid { grid-template-columns: 1fr; }
  #main-content { padding: 24px 20px 60px; }
  .metric-row { grid-template-columns: 1.5fr 1fr; grid-template-rows: auto auto; }
  .mr-ref, .mr-trend { font-size: 0.65rem; }
}
</style>
</head>
