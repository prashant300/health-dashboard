window.getStatus = (key, val) => {
  const r = RANGES[key];
  if (!r || val==null) return "unknown";
  if (key==="hdl") { if(val>=r.min) return "normal"; if(val>=r.min*0.85) return "warn"; return "danger"; }
  if (val < r.min) return val < r.min*0.85 ? "danger" : "warn";
  if (val > r.max) return val > r.max*1.15 ? "danger" : "warn";
  return "normal";
};

// ── FIREBASE HELPERS ───────────────────────────────────────────────────
async function saveReport(uid, r)  { await setDoc(doc(db,"users",uid,"reports",r.id), r); }
async function loadReports(uid)    {
  const snap = await getDocs(collection(db,"users",uid,"reports"));
  const arr=[]; snap.forEach(d=>arr.push(d.data()));
  return arr.sort((a,b)=>a.date.localeCompare(b.date));
}
async function deleteReport(uid,id){ await deleteDoc(doc(db,"users",uid,"reports",id)); }
async function seedIfEmpty(uid)    {
  const snap = await getDocs(collection(db,"users",uid,"reports"));
  if(snap.empty) for(const r of SEED_REPORTS) await saveReport(uid,r);
}

async function writeSnapshot(allReports) {
  const trends={};
  allReports.forEach(rep=>Object.entries(rep.metrics).forEach(([k,v])=>{
    if(!trends[k]) trends[k]=[];
    trends[k].push({date:rep.date,label:rep.label,value:v});
  }));
  const latest = allReports.length ? allReports[allReports.length-1].metrics : {};
  const flags = Object.entries(latest)
    .map(([k,v])=>({k,v,st:window.getStatus(k,v)}))
    .filter(x=>x.st!=="normal"&&x.st!=="unknown")
    .map(({k,v,st})=>({
      metric:k, label:(RANGES[k]||{}).label||k, value:v,
      unit:(RANGES[k]||{}).unit||"", status:st,
      ref:RANGES[k]?`${RANGES[k].min}–${RANGES[k].max}`:""
    }));
  await setDoc(doc(db,"claude_snapshot","health_data"),{
    patient:{name:"Prashant Yadav",age:32,sex:"Male",email:ALLOWED_EMAIL},
    lastUpdated:new Date().toISOString(),
    reportCount:allReports.length,
    reportDates:allReports.map(r=>({date:r.date,label:r.label})),
    latestReport:allReports[allReports.length-1]||null,
    previousReport:allReports[allReports.length-2]||null,
    trends, flags, allReports
  });
}

// ── STATE ──────────────────────────────────────────────────────────────
let currentUser=null, reports=[], activeGroup="Overview";

onAuthStateChanged(auth, async user=>{
  if(user){
    if(user.email!==ALLOWED_EMAIL){
      document.getElementById("auth-screen").innerHTML=
        `<div class="auth-box"><p style="color:#ff6b6b;font-size:1rem">Access denied.</p>
         <button class="btn-g" onclick="window.__so()">Sign out</button></div>`;
      return;
    }
    currentUser=user;
    await seedIfEmpty(user.uid);
    reports=await loadReports(user.uid);
    await writeSnapshot(reports);
    document.getElementById("auth-screen").style.display="none";
    document.getElementById("app").style.display="grid";
    renderSidebar(); renderMain();
  } else {
    document.getElementById("auth-screen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
});

window.__si  = async()=>{ try{ await signInWithPopup(auth,provider); }catch(e){ alert(e.message); }};
window.__so  = ()=>signOut(auth);
window.__sg  = g=>{ activeGroup=g; renderSidebar(); renderMain(); };
window.__del = async id=>{
  if(!confirm(`Delete report ${id}?`)) return;
  await deleteReport(currentUser.uid,id);
  reports=reports.filter(r=>r.id!==id);
  await writeSnapshot(reports); renderMain();
};
window.__save = async rep=>{
  await saveReport(currentUser.uid,rep);
  const i=reports.findIndex(r=>r.id===rep.id);
  if(i>=0) reports[i]=rep; else reports.push(rep);
  reports.sort((a,b)=>a.date.localeCompare(b.date));
  await writeSnapshot(reports); closeModal(); renderMain();
};

// ── OVERVIEW ───────────────────────────────────────────────────────────
function renderOverview(){
  const flags = computeFlags();
  const latest = reports[reports.length-1]?.metrics||{};
  const prev   = reports[reports.length-2]?.metrics||{};

  const hero = [
    {key:"fasting_glucose", icon:"◈"},
    {key:"ldl",             icon:"◎"},
    {key:"hdl",             icon:"◉"},
    {key:"uric_acid",       icon:"◇"},
    {key:"sgot",            icon:"⬟"},
    {key:"vitamin_d",       icon:"⬡"},
    {key:"vitamin_b12",     icon:"⬢"},
    {key:"prolactin",       icon:"◈"},
    {key:"body_fat_pct",    icon:"◑"},
    {key:"smm",             icon:"◉"},
  ];

  const insights = computeInsights();

  return `
    <div class="page-header">
      <div>
        <h1 class="page-title">Overview</h1>
        <div class="page-sub">Last updated ${reports[reports.length-1]?.date||"—"} · ${reports[reports.length-1]?.label||""}</div>
      </div>
    </div>

    <!-- HERO KPI STRIP -->
    <div class="kpi-grid">
      ${hero.map(({key,icon})=>{
        const r=RANGES[key]; if(!r) return "";
        const cur=latest[key], prv=prev[key];
        if(cur==null) return "";
        const st=getStatus(key,cur);
        const delta=prv!=null?(cur-prv):null;
        const sign=delta===null?"":delta>0?"↑":"↓";
        const dClass=(key==="hdl")?(delta>0?"d-pos":"d-neg"):(delta>0?"d-neg":"d-pos");
        return `<div class="kpi kpi-${st}">
          <div class="kpi-icon">${icon}</div>
          <div class="kpi-label">${r.label}</div>
          <div class="kpi-val">${cur}<span class="kpi-unit"> ${r.unit}</span></div>
          ${delta!==null?`<div class="kpi-delta ${dClass}">${sign}${Math.abs(delta).toFixed(1)}</div>`:""}
          <div class="kpi-ref">${r.min}–${r.max}</div>
        </div>`;
      }).join("")}
    </div>

    <!-- INSIGHTS -->
    ${insights.length?`
    <div class="section-head"><span>Insights</span></div>
    <div class="insights-grid">
      ${insights.map(i=>`
        <div class="insight insight-${i.type}">
          <span class="i-icon">${i.icon}</span>
          <span class="i-text">${i.text}</span>
        </div>`).join("")}
    </div>`:""}

    <!-- FLAGGED METRICS -->
    ${flags.danger.length||flags.warn.length?`
    <div class="section-head"><span>Needs Attention</span></div>
    <div class="flags-table">
      <div class="ft-head"><span>Metric</span><span>Value</span><span>Reference</span><span>Status</span><span>Trend</span></div>
      ${[...flags.danger,...flags.warn].map(f=>{
        const pts=reports.map(r=>r.metrics[f.metric]).filter(v=>v!=null);
        const trend=pts.length>1?(pts[pts.length-1]>pts[pts.length-2]?"↑ Rising":"↓ Falling"):"—";
        return `<div class="ft-row">
          <span class="ft-name">${f.label}</span>
          <span class="ft-val">${f.value} ${f.unit}</span>
          <span class="ft-ref">${f.ref}</span>
          <span class="ft-st ft-${f.status}">${f.status==="danger"?"Critical":"Watch"}</span>
          <span class="ft-trend">${trend}</span>
        </div>`;
      }).join("")}
    </div>`:""}

    <!-- MINI TREND ROW for key metrics -->
    <div class="section-head"><span>Key Trends</span></div>
    <div class="mini-chart-grid">
      ${["ldl","hdl","triglycerides","uric_acid","sgot","sgpt","vitamin_d","vitamin_b12","tsh","prolactin","fasting_glucose","eosinophils","body_fat_pct","smm","body_weight"].map(key=>{
        const pts=reports.map(r=>({date:r.date,val:r.metrics[key]})).filter(p=>p.val!=null);
        if(!pts.length) return "";
        const r=RANGES[key], st=getStatus(key,pts[pts.length-1].val);
        return `<div class="mini-card mc-${st}">
          <div class="mc-top">
            <span class="mc-name">${r.label}</span>
            <span class="mc-now">${pts[pts.length-1].val} <em>${r.unit}</em></span>
          </div>
          <canvas id="mc-${key}" class="mc-canvas" width="280" height="72"></canvas>
          <div class="mc-dates">${pts.map(p=>`<span class="mcd-${getStatus(key,p.val)}">${p.date.slice(5)}</span>`).join("→")}</div>
        </div>`;
      }).join("")}
    </div>
  `;
}

        <div class="page-sub">${keys.length} parameters tracked</div>
      </div>
    </div>
    <div class="detail-grid">
      ${keys.map(key=>{
        const r=RANGES[key];
        const pts=reports.map(rep=>({date:rep.date,label:rep.label,val:rep.metrics[key]})).filter(p=>p.val!=null);
        if(!pts.length) return "";
        const cur=pts[pts.length-1], prv=pts[pts.length-2];
        const st=getStatus(key,cur.val);
        const delta=prv?(cur.val-prv.val):null;
        const sign=delta===null?"":delta>0?"↑":"↓";
        const dClass=(key==="hdl")?(delta>0?"d-pos":"d-neg"):(delta>0?"d-neg":"d-pos");
        return `<div class="detail-card dc-${st}">
          <div class="dc-header">
            <div>
              <div class="dc-name">${r.label}</div>
              <div class="dc-ref">ref ${r.min}–${r.max} ${r.unit}</div>
            </div>
            <div class="dc-right">
              <div class="dc-val">${cur.val}</div>
              <div class="dc-unit">${r.unit}</div>
              ${delta!==null?`<div class="dc-delta ${dClass}">${sign}${Math.abs(delta).toFixed(1)}</div>`:""}
            </div>
          </div>
          <canvas id="dc-${key}" class="dc-canvas" width="320" height="90"></canvas>
          <div class="dc-history">
            ${pts.map(p=>`<span class="dh-pt dh-${getStatus(key,p.val)}" title="${p.label}">${p.date.slice(2)}: ${p.val}</span>`).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>
  `;
}

// ── HISTORY PAGE ───────────────────────────────────────────────────────
function renderHistory(){
  return `
    <div class="page-header">

        const flags=Object.entries(rep.metrics)
          .filter(([k,v])=>getStatus(k,v)!=="normal"&&getStatus(k,v)!=="unknown");
        const dangerCount=flags.filter(([k,v])=>getStatus(k,v)==="danger").length;
        const warnCount  =flags.filter(([k,v])=>getStatus(k,v)==="warn").length;

              ${!dangerCount&&!warnCount?`<span class="hc-ok">All clear</span>`:""}
              <button class="btn-del-hist" onclick="window.__del('${rep.id}')">✕</button>
            </div>

// ── CHART DRAWING ──────────────────────────────────────────────────────
function drawAllCharts(){
  // Mini overview charts
  ["ldl","hdl","triglycerides","uric_acid","sgot","sgpt","vitamin_d","vitamin_b12","tsh","prolactin","fasting_glucose","eosinophils","body_fat_pct","smm","body_weight"].forEach(k=>{
    const c=document.getElementById(`mc-${k}`);
    if(c) drawChart(c, k, 280, 72, true);
  });
  // Detail cards
  Object.keys(RANGES).forEach(k=>{
    const c=document.getElementById(`dc-${k}`);
    if(c) drawChart(c, k, 320, 90, false);
  });
}

function drawChart(canvas, key, W, H, mini){
  const r=RANGES[key];
  const pts=reports.map(rep=>rep.metrics[key]).filter(v=>v!=null);
  if(!pts.length) return;
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);
  const pad={l:mini?4:30, r:mini?4:10, t:mini?4:8, b:mini?4:22};
  const IW=W-pad.l-pad.r, IH=H-pad.t-pad.b;

  const allV=[...pts,r.min,r.max];
  const lo=Math.min(...allV)*0.88, hi=Math.max(...allV)*1.1;
  const toY=v=>pad.t+IH-(((v-lo)/(hi-lo))*IH);
  const toX=i=>pts.length<2?pad.l+IW/2:pad.l+(i/(pts.length-1))*IW;

  // Normal band
  const yLo=toY(r.min), yHi=toY(r.max);
  ctx.fillStyle="rgba(134,239,172,0.07)";
  ctx.fillRect(pad.l, yHi, IW, yLo-yHi);

  // Ref lines
  ctx.save(); ctx.setLineDash([3,3]); ctx.lineWidth=1;
  [r.min,r.max].forEach(v=>{
    ctx.strokeStyle="rgba(134,239,172,0.35)";
    ctx.beginPath(); ctx.moveTo(pad.l,toY(v)); ctx.lineTo(pad.l+IW,toY(v)); ctx.stroke();
  });
  ctx.restore();

  // Y axis labels (detail only)
  if(!mini){
    ctx.fillStyle="rgba(148,163,184,0.6)";
    ctx.font="9px Geist Mono, monospace";
    ctx.textAlign="right";
    [r.min,r.max].forEach(v=>ctx.fillText(v, pad.l-4, toY(v)+3));
    // X axis dates
    ctx.textAlign="center";
    reports.filter(rep=>rep.metrics[key]!=null).forEach((rep,i)=>{
      const allPts=reports.filter(r2=>r2.metrics[key]!=null);
      const xi=allPts.indexOf(rep);
      ctx.fillText(rep.date.slice(5), toX(xi), H-4);
    });
  }

  if(pts.length===1){
    const st=getStatus(key,pts[0]);
    ctx.beginPath(); ctx.arc(toX(0),toY(pts[0]),5,0,Math.PI*2);
    ctx.fillStyle=st==="normal"?"#86efac":st==="warn"?"#fcd34d":"#fca5a5";
    ctx.fill(); return;
  }

  // Area fill
  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.lineTo(toX(pts.length-1),H); ctx.lineTo(toX(0),H); ctx.closePath();
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"rgba(96,165,250,0.18)"); g.addColorStop(1,"rgba(96,165,250,0)");
  ctx.fillStyle=g; ctx.fill();

  // Line
  ctx.beginPath();
  pts.forEach((v,i)=>i===0?ctx.moveTo(toX(i),toY(v)):ctx.lineTo(toX(i),toY(v)));
  ctx.strokeStyle="rgba(96,165,250,0.7)"; ctx.lineWidth=1.5; ctx.lineJoin="round"; ctx.stroke();

  // Dots
  pts.forEach((v,i)=>{
    const st=getStatus(key,v);
    ctx.beginPath(); ctx.arc(toX(i),toY(v),mini?3:4,0,Math.PI*2);
    ctx.fillStyle=st==="normal"?"#86efac":st==="warn"?"#fcd34d":"#fca5a5";
    ctx.strokeStyle="rgba(15,23,42,0.8)"; ctx.lineWidth=1.2;
    ctx.fill(); ctx.stroke();
  });
}

// ── INSIGHTS & FLAGS ───────────────────────────────────────────────────
function computeFlags(){
  const latest=reports[reports.length-1]?.metrics||{};
  const danger=[], warn=[];
  Object.entries(latest).forEach(([k,v])=>{
    const st=getStatus(k,v); if(!RANGES[k]) return;
    const f={metric:k,label:RANGES[k].label,value:v,unit:RANGES[k].unit,ref:`${RANGES[k].min}–${RANGES[k].max}`,status:st};
    if(st==="danger") danger.push(f);
    else if(st==="warn") warn.push(f);
  });
  return {danger,warn};
}

function computeInsights(){
  if(reports.length<2) return [{type:"info",icon:"·",text:"Add more reports to see trend insights."}];
  const cur=reports[reports.length-1].metrics, prv=reports[reports.length-2].metrics;
  const ins=[];
  const chk=(k,good,bad)=>{
    const c=cur[k],p=prv[k]; if(c==null) return;
    const cs=getStatus(k,c), ps=getStatus(k,p??c);
    if(ps!=="normal"&&cs==="normal") ins.push({type:"good",icon:"↗",text:good});
    else if(ps==="normal"&&cs!=="normal") ins.push({type:"bad",icon:"↘",text:bad});
    else if(cs!=="normal"){
      const worse=(k==="hdl")?(c<p):(c>p);
      if(p!=null&&worse) ins.push({type:"bad",icon:"↑",text:`${RANGES[k].label} worsening: ${p}→${c} ${RANGES[k].unit}`});
      else if(p!=null) ins.push({type:"warn",icon:"→",text:`${RANGES[k].label} still out of range: ${c} ${RANGES[k].unit}`});
    }
  };
  chk("sgot","Liver SGOT normalised","SGOT elevated — monitor liver");
  chk("sgpt","Liver SGPT normalised","SGPT elevated — monitor liver");
  chk("vitamin_d","Vitamin D now sufficient","Vitamin D dropped — supplement needed");
  chk("vitamin_b12","B12 back in range","B12 dropped below range");
  chk("uric_acid","Uric acid normalised","Uric acid elevated — dietary change needed");
  chk("ldl","LDL now optimal","LDL above optimal");
  chk("hdl","HDL improved into range","HDL below target");
  chk("triglycerides","Triglycerides normalised","Triglycerides borderline high");
  chk("prolactin","Prolactin normalised","Prolactin elevated — repeat fasting test");
  chk("eosinophils","Eosinophils normalised","Eosinophils elevated — check allergy/parasite");
  chk("non_hdl","Non-HDL improved","Non-HDL rising — cardiovascular risk");
  if(!ins.length) ins.push({type:"good",icon:"✓",text:"All tracked metrics are within normal range."});
  return ins;
}

// ── ADD REPORT MODAL ───────────────────────────────────────────────────
window.openModal = ()=>{
  const groups=[...new Set(Object.values(RANGES).map(r=>r.group))];
  document.getElementById("modal").style.display="flex";
  document.getElementById("modal-inner").innerHTML=`
    <div class="m-head">
      <h2>Add Report</h2>
      <button class="m-close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-meta">
      <label>Date<input type="date" id="nd" value="${new Date().toISOString().slice(0,10)}"/></label>
      <label>Lab / Source<input type="text" id="nl" placeholder="e.g. Apollo Hospital"/></label>
    </div>
    <div class="m-groups">
      ${groups.map(g=>`
        <div class="m-group">
          <div class="m-gtitle">${g}</div>
          <div class="m-fields">
            ${Object.keys(RANGES).filter(k=>RANGES[k].group===g).map(k=>`
              <label class="m-field">
                <span>${RANGES[k].label}<em>${RANGES[k].unit}</em></span>
                <input type="number" step="any" id="f-${k}" placeholder="${RANGES[k].min}–${RANGES[k].max}"/>
              </label>`).join("")}
          </div>
        </div>`).join("")}
    </div>
    <div class="m-foot">
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
      <button class="m-save" onclick="submitReport()">Save Report</button>
    </div>
  `;
};
window.closeModal = ()=>document.getElementById("modal").style.display="none";
window.submitReport = async()=>{
  const date=document.getElementById("nd").value;
  const label=document.getElementById("nl").value||"Unknown Lab";
  if(!date){ alert("Select a date"); return; }
  const metrics={};
  Object.keys(RANGES).forEach(k=>{
    const el=document.getElementById(`f-${k}`);
    if(el&&el.value!=="") metrics[k]=parseFloat(el.value);
  });
  if(!Object.keys(metrics).length){ alert("Enter at least one value"); return; }
  await window.__save({id:date,date,label,metrics});
};

.dc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.dc-name   { font-size: 0.82rem; font-weight: 500; color: var(--text); }
.dc-ref    { font-size: 0.65rem; color: var(--text3); margin-top: 2px; }
.dc-right  { text-align: right; }
.dc-val    { font-size: 1.4rem; font-weight: 300; }
.dc-unit   { font-size: 0.65rem; color: var(--text3); }
.dc-delta  { font-size: 0.7rem; margin-top: 2px; }
.dc-canvas { display: block; width: 100%; }
.dc-history{ display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.dh-pt { font-size: 0.62rem; padding: 2px 6px; border-radius: 4px; }
.dh-normal { background: rgba(134,239,172,0.1); color: var(--green); }
.dh-warn   { background: rgba(252,211,77,0.1);  color: var(--yellow); }
.dh-danger { background: rgba(252,165,165,0.1); color: var(--red); }

/* ── HISTORY ── */
.hist-list { display: flex; flex-direction: column; gap: 14px; }
.hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; }
.hist-top  { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.hist-date { font-family: var(--serif); font-size: 1.2rem; font-style: italic; }
.hist-lab  { font-size: 0.72rem; color: var(--text3); margin-top: 2px; }
.hist-counts { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.hc-total { font-size: 0.68rem; color: var(--text3); }
.hc-d     { font-size: 0.68rem; background: rgba(252,165,165,0.1); color: var(--red); padding: 2px 8px; border-radius: 20px; }
.hc-w     { font-size: 0.68rem; background: rgba(252,211,77,0.1); color: var(--yellow); padding: 2px 8px; border-radius: 20px; }
.hc-ok    { font-size: 0.68rem; background: rgba(134,239,172,0.1); color: var(--green); padding: 2px 8px; border-radius: 20px; }
.btn-del-hist { background: transparent; border: 1px solid rgba(252,165,165,0.2); color: var(--red); padding: 3px 8px; border-radius: 6px; font-size: 0.72rem; }
.hist-metrics { display: flex; flex-wrap: wrap; gap: 6px; }
.hm-chip  { font-size: 0.65rem; padding: 3px 8px; border-radius: 5px; }
.hm-normal{ background: rgba(134,239,172,0.07); color: var(--text2); }
.hm-warn  { background: rgba(252,211,77,0.1); color: var(--yellow); }
.hm-danger{ background: rgba(252,165,165,0.1); color: var(--red); }
.hm-more  { background: var(--surface2); color: var(--text3); }

/* ── MODAL ── */
#modal {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 20px;
}
#modal-inner {
  background: var(--surface); border: 1px solid var(--border2); border-radius: 16px;
  width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto;
  display: flex; flex-direction: column;
}
.m-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface); z-index: 1;
}
.m-head h2 { font-family: var(--serif); font-style: italic; font-size: 1.3rem; font-weight: 400; }
.m-close { background: transparent; border: 1px solid var(--border); color: var(--text2); width: 28px; height: 28px; border-radius: 7px; font-size: 0.9rem; }
.m-meta { display: flex; gap: 14px; padding: 16px 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.m-meta label { display: flex; flex-direction: column; gap: 4px; font-size: 0.72rem; color: var(--text3); flex: 1; min-width: 150px; }
.m-meta input { background: var(--bg); border: 1px solid var(--border2); color: var(--text); padding: 8px 10px; border-radius: 7px; font-size: 0.82rem; }
.m-groups { padding: 16px 24px; flex: 1; }
.m-group { margin-bottom: 18px; }
.m-gtitle { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.m-fields { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr)); gap: 8px; }
.m-field { display: flex; flex-direction: column; gap: 3px; font-size: 0.7rem; color: var(--text3); }
.m-field em { color: var(--accent); font-style: normal; margin-left: 4px; font-size: 0.62rem; }
.m-field input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 9px; border-radius: 6px; font-size: 0.78rem; }
.m-field input:focus { outline: none; border-color: var(--accent); }
.m-foot { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 24px; border-top: 1px solid var(--border); position: sticky; bottom: 0; background: var(--surface); }
.m-cancel { padding: 8px 16px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: 7px; font-size: 0.78rem; }
.m-save { padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: 7px; font-size: 0.78rem; font-weight: 500; }
.m-save:hover { background: #2563eb; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 900px) {
  #app { grid-template-columns: 1fr; }
  #sidebar { position: relative; height: auto; flex-direction: row; flex-wrap: wrap; padding: 12px; }
  .kpi-grid { grid-template-columns: repeat(2,1fr); }
  .mini-chart-grid { grid-template-columns: repeat(2,1fr); }
  .detail-grid { grid-template-columns: 1fr; }
  #main-content { padding: 20px; }
}
@media (max-width: 560px) {
  .kpi-grid { grid-template-columns: repeat(2,1fr); }
  .mini-chart-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
