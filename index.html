  // ── STATUS HELPER ─────────────────────────────────────────────────
  window.getStatus = (key, val) => {
    const r = RANGES[key];
    if (!r || val === null || val === undefined) return "unknown";
    if (key === "hdl") {
      if (val >= r.min) return "normal";
      if (val >= r.min * 0.85) return "warn";
      return "danger";
    }
    if (val < r.min) return val < r.min * 0.85 ? "danger" : "warn";
    if (val > r.max) return val > r.max * 1.15 ? "danger" : "warn";
    return "normal";
  };

  // ── FIREBASE HELPERS ──────────────────────────────────────────────
  async function saveReport(uid, report) {
    await setDoc(doc(db, "users", uid, "reports", report.id), report);
  }
  async function loadReports(uid) {
    const snap = await getDocs(collection(db, "users", uid, "reports"));
    const arr = [];
    snap.forEach(d => arr.push(d.data()));
    arr.sort((a, b) => a.date.localeCompare(b.date));
    return arr;
  }
  async function deleteReport(uid, id) {
    await deleteDoc(doc(db, "users", uid, "reports", id));
  }

  // ── SEED if first login ───────────────────────────────────────────
  async function seedIfEmpty(uid) {
    const snap = await getDocs(collection(db, "users", uid, "reports"));
    if (snap.empty) {
      for (const r of SEED_REPORTS) await saveReport(uid, r);
    }
  }

      document.getElementById("auth-screen").style.display = "none";

      window.__reports = reports;
      renderApp();

    else reports.push(report);
    reports.sort((a, b) => a.date.localeCompare(b.date));
    window.__reports = reports;
    renderApp();
  };

  // ── SUMMARY CARDS ─────────────────────────────────────────────────
  function renderSummaryCards() {
    if (reports.length < 2) return "";
    const latest = reports[reports.length - 1].metrics;
    const prev   = reports[reports.length - 2].metrics;
    const cards = [
      { key: "fasting_glucose", emoji: "🩸" },
      { key: "ldl",             emoji: "💛" },
      { key: "hdl",             emoji: "✅" },
      { key: "uric_acid",       emoji: "⚗️" },
      { key: "sgot",            emoji: "🫀" },
      { key: "vitamin_d",       emoji: "☀️" },
      { key: "vitamin_b12",     emoji: "🔴" },
      { key: "prolactin",       emoji: "⚙️" },
    ];
    return cards.map(({key, emoji}) => {
      const cur = latest[key], prv = prev[key];
      const r = RANGES[key];
      if (cur === undefined) return "";
      const st = getStatus(key, cur);
      const delta = prv !== undefined ? (cur - prv).toFixed(1) : null;
      const arrow = delta === null ? "" : delta > 0 ? "▲" : delta < 0 ? "▼" : "–";
      const deltaClass = (key==="hdl") ? (delta>0?"pos":"neg") : (delta>0?"neg":"pos");
      return `<div class="summary-card s-${st}">
        <div class="sc-emoji">${emoji}</div>
        <div class="sc-label">${r.label}</div>
        <div class="sc-val">${cur} <span class="sc-unit">${r.unit}</span></div>
        ${delta !== null ? `<div class="sc-delta ${deltaClass}">${arrow} ${Math.abs(delta)}</div>` : ""}
        <div class="sc-badge badge-${st}">${st==="normal"?"✓ Normal":st==="warn"?"⚠ Watch":"✗ High"}</div>
      </div>`;
    }).join("");
  }

  // ── METRIC CARD ───────────────────────────────────────────────────
  function renderMetricCard(key) {
    const r = RANGES[key];
    const points = reports.map(rep => ({
      date: rep.date,
      label: rep.label,
      val: rep.metrics[key]
    })).filter(p => p.val !== undefined);
    if (points.length === 0) return "";
    const latest = points[points.length - 1];
    const st = getStatus(key, latest.val);
    const prev = points.length > 1 ? points[points.length - 2] : null;
    const delta = prev ? (latest.val - prev.val) : null;
    const arrow = delta === null ? "" : delta > 0 ? "▲" : delta < 0 ? "▼" : "–";
    const deltaColor = (key==="hdl") ?
      (delta>0?"#4ade80":"#f87171") : (delta>0?"#f87171":"#4ade80");

    return `<div class="metric-card mc-${st}">
      <div class="mc-header">
        <span class="mc-name">${r.label}</span>
        <span class="mc-group">${r.group}</span>
      </div>
      <div class="mc-body">
        <div class="mc-main">
          <span class="mc-val">${latest.val}</span>
          <span class="mc-unit">${r.unit}</span>
          ${delta !== null ? `<span class="mc-delta" style="color:${deltaColor}">${arrow}${Math.abs(delta).toFixed(1)}</span>` : ""}
        </div>
        <div class="mc-range">Ref: ${r.min}–${r.max} ${r.unit}</div>
      </div>
      <canvas id="spark-${key}" class="sparkline" width="240" height="64"></canvas>
      <div class="mc-dots">
        ${points.map(p => `<span class="mc-dot s-${getStatus(key,p.val)}" title="${p.date}: ${p.val}">${p.val}</span>`).join(" → ")}
      </div>
    </div>`;
  }

  // ── SPARKLINE ─────────────────────────────────────────────────────
  function drawSparkline(key) {
    const canvas = document.getElementById(`spark-${key}`);
    if (!canvas) return;
    const r = RANGES[key];
    const points = reports.map(rep => rep.metrics[key]).filter(v => v !== undefined);
    if (points.length < 1) return;
    const ctx = canvas.getContext("2d");
    const W = 240, H = 64, pad = 10;
    ctx.clearRect(0, 0, W, H);

    const allVals = [...points, r.min, r.max];
    const lo = Math.min(...allVals) * 0.92;
    const hi = Math.max(...allVals) * 1.08;
    const toY = v => H - pad - ((v - lo) / (hi - lo)) * (H - pad*2);
    const toX = i => points.length < 2 ? W/2 : pad + (i / (points.length - 1)) * (W - pad*2);

    // Reference band
    ctx.fillStyle = "rgba(74,222,128,0.08)";
    const yMin = toY(r.min), yMax = toY(r.max);
    ctx.fillRect(0, yMax, W, yMin - yMax);

    // Ref lines
    ctx.strokeStyle = "rgba(74,222,128,0.3)";
    ctx.setLineDash([4,3]);
    ctx.lineWidth = 1;
    [r.min, r.max].forEach(v => {
      ctx.beginPath(); ctx.moveTo(0, toY(v)); ctx.lineTo(W, toY(v)); ctx.stroke();
    });
    ctx.setLineDash([]);

    if (points.length === 1) {
      // Single point — draw a dot
      const x = W/2, y = toY(points[0]);
      const st = getStatus(key, points[0]);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI*2);
      ctx.fillStyle = st==="normal" ? "#4ade80" : st==="warn" ? "#fbbf24" : "#f87171";
      ctx.fill();
      return;
    }

    // Line
    ctx.beginPath();
    points.forEach((v, i) => i===0 ? ctx.moveTo(toX(i),toY(v)) : ctx.lineTo(toX(i),toY(v)));
    ctx.strokeStyle = "#60a5fa";
    ctx.lineWidth = 2;
    ctx.lineJoin = "round";
    ctx.stroke();

    // Fill under line
    ctx.beginPath();
    points.forEach((v, i) => i===0 ? ctx.moveTo(toX(i),toY(v)) : ctx.lineTo(toX(i),toY(v)));
    ctx.lineTo(toX(points.length-1), H);
    ctx.lineTo(toX(0), H);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, "rgba(96,165,250,0.25)");
    grad.addColorStop(1, "rgba(96,165,250,0)");
    ctx.fillStyle = grad;
    ctx.fill();

    // Dots
    points.forEach((v, i) => {
      const st = getStatus(key, v);
      ctx.beginPath();
      ctx.arc(toX(i), toY(v), 4, 0, Math.PI*2);
      ctx.fillStyle = st==="normal" ? "#4ade80" : st==="warn" ? "#fbbf24" : "#f87171";
      ctx.strokeStyle = "#1e293b";
      ctx.lineWidth = 1.5;
      ctx.fill(); ctx.stroke();
    });
  }

  // ── INSIGHTS ENGINE ───────────────────────────────────────────────
  function computeInsights() {
    const ins = [];
    if (reports.length < 2) return [{ type:"info", icon:"ℹ️", text:"Add more reports to see trend insights." }];
    const latest = reports[reports.length-1].metrics;
    const prev   = reports[reports.length-2].metrics;

    const check = (key, improvedMsg, worsenedMsg, newConcernMsg) => {
      const cur = latest[key], prv = prev[key];
      if (cur === undefined) return;
      const curSt = getStatus(key, cur);
      const prvSt = prv !== undefined ? getStatus(key, prv) : null;
      if (prvSt === null) {
        if (curSt !== "normal") ins.push({ type:"warn", icon:"⚠️", text: newConcernMsg || `${RANGES[key].label}: ${cur} ${RANGES[key].unit} — outside range` });
      } else if (prvSt !== "normal" && curSt === "normal") {
        ins.push({ type:"good", icon:"✅", text: improvedMsg });
      } else if (prvSt === "normal" && curSt !== "normal") {
        ins.push({ type:"bad", icon:"🔴", text: worsenedMsg });
      } else if (curSt !== "normal") {
        const delta = cur - prv;
        const worse = (key === "hdl") ? delta < 0 : delta > 0;
        if (worse) ins.push({ type:"bad", icon:"📈", text: `${RANGES[key].label} worsening: ${prv}→${cur} ${RANGES[key].unit}` });
        else ins.push({ type:"warn", icon:"📉", text: `${RANGES[key].label} improving but still out: ${prv}→${cur} ${RANGES[key].unit}` });
      }
    };

    check("sgot","SGOT/AST normalised ✓","SGOT elevated — check liver");
    check("sgpt","SGPT/ALT normalised ✓","SGPT elevated — check liver");
    check("vitamin_d","Vitamin D now sufficient ✓","Vitamin D dropped below optimal","Vitamin D deficient — supplement needed");
    check("vitamin_b12","B12 back to normal","B12 dropped below range — supplement","B12 below range — supplement");
    check("uric_acid","Uric acid normalised ✓","Uric acid now elevated — dietary changes needed");
    check("ldl","LDL now optimal","LDL rose above optimal");
    check("hdl","HDL improved into range","HDL dropped below range");
    check("triglycerides","Triglycerides normalised","Triglycerides borderline high");
    check("prolactin","Prolactin normalised","Prolactin elevated — repeat fasting test needed","Prolactin elevated — repeat fasting test");
    check("tsh","TSH normalised","TSH slightly elevated — monitor thyroid");
    check("fasting_glucose","Fasting glucose improved ✓","Fasting glucose rising — monitor");
    check("eosinophils","Eosinophils normalised","Eosinophils elevated — possible allergy/parasite","Eosinophils elevated");
    check("non_hdl","Non-HDL improved","Non-HDL rising — cardiovascular risk");
    check("tc_hdl_ratio","TC:HDL ratio improved","TC:HDL ratio worsening — cardiovascular risk");
    check("chloride","Chloride normalised","Chloride slightly above range","Chloride mildly high");

    if (ins.length === 0) ins.push({ type:"good", icon:"🌟", text:"All tracked metrics are within normal range!" });
    return ins;
  }

  // ── ADD REPORT MODAL ──────────────────────────────────────────────
  window.openAddModal = () => {
    const allKeys = Object.keys(RANGES);
    const groups  = [...new Set(Object.values(RANGES).map(r => r.group))];
    document.getElementById("modal-backdrop").style.display = "flex";
    document.getElementById("modal-inner").innerHTML = `
      <div class="modal-header">
        <h2>Add New Report</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-meta">
        <label>Date <input type="date" id="new-date" value="${new Date().toISOString().slice(0,10)}" /></label>
        <label>Source <input type="text" id="new-label" placeholder="e.g. Apollo Hospital" /></label>
      </div>
      <div class="modal-groups">
        ${groups.map(g => `
          <div class="modal-group">
            <div class="modal-group-title">${g}</div>
            <div class="modal-fields">
              ${allKeys.filter(k => RANGES[k].group === g).map(k => `
                <label class="field-label">
                  <span>${RANGES[k].label} <em>${RANGES[k].unit}</em></span>
                  <input type="number" step="any" id="f-${k}" placeholder="${RANGES[k].min}–${RANGES[k].max}" />
                </label>
              `).join("")}
            </div>
          </div>
        `).join("")}
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="submitReport()">Save Report</button>
      </div>
    `;
  };

  window.closeModal = () => { document.getElementById("modal-backdrop").style.display = "none"; };

  window.submitReport = async () => {
    const date  = document.getElementById("new-date").value;
    const label = document.getElementById("new-label").value || "Unknown Lab";
    if (!date) { alert("Please select a date."); return; }
    const metrics = {};
    Object.keys(RANGES).forEach(k => {
      const el = document.getElementById(`f-${k}`);
      if (el && el.value !== "") metrics[k] = parseFloat(el.value);
    });
    if (Object.keys(metrics).length === 0) { alert("Please enter at least one metric."); return; }
    const report = { id: date, date, label, metrics };
    await window.__saveNewReport(report);
    closeModal();
  };
</script>
